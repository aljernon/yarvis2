name: Pre-commit

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: pre-commit
        uses: pre-commit/action@v3.0.1
        env:
          SKIP: pyre
        with:
          extra_args: --all-files
