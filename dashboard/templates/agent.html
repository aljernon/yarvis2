{% extends "base.html" %}
{% set active_page = "agent" %}
{% block content %}
<div class="controls" id="agent-controls">
  <span style="color:#7a6880;font-size:0.9em" id="agent-subtitle">Main chat agent view (hardcoded to root user)</span>
  <button id="agent-full-btn" onclick="toggleFullHistory()">show full history</button>
  <button id="agent-token-btn" onclick="fetchAgentTokens()">tokens?</button>
  <span id="agent-token-info" class="token-info"></span>
</div>
<div id="agent-container">
  <div class="loading" style="display:none" id="agent-loading">Loading agent view...</div>
</div>
<div id="chat-response-container"></div>
<div class="chat-input-area" id="chat-input-area">
  <textarea id="chat-input" placeholder="Send ephemeral message to agent (Ctrl+Enter to send)..." rows="2"></textarea>
  <select id="chat-model">
    <option value="opus">opus</option>
    <option value="sonnet">sonnet</option>
    <option value="haiku">haiku</option>
  </select>
  <button id="chat-send-btn" onclick="sendAgentChat()">Send</button>
  <span id="chat-status" class="chat-status"></span>
</div>
{% endblock %}
