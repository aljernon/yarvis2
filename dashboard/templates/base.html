<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yarvis Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
</head>
<body>
  <nav>
    <div class="nav-brand">Yarvis Dashboard</div>
    <div class="nav-links">
      <a href="/messages" class="{% if active_page == 'messages' %}active{% endif %}">Messages</a>
      <a href="/schedules" class="{% if active_page == 'schedules' %}active{% endif %}">Schedules</a>
      <a href="/agent" class="{% if active_page == 'agent' %}active{% endif %}">POV</a>
      <a href="/agents" class="{% if active_page == 'agents' %}active{% endif %}">Agents</a>
      <a href="/workspace" class="{% if active_page == 'workspace' %}active{% endif %}">Workspace</a>
      <a href="/locations" class="{% if active_page == 'locations' %}active{% endif %}">Locations</a>
    </div>
    <div class="nav-stats" id="nav-stats"></div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
